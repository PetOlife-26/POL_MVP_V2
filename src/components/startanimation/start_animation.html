<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Start Animation</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: black;
      overflow: hidden;
    }
    .startup-container {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  width: 100vw;
  background-color: black;
  overflow: hidden;
  margin: 0;
  padding: 0;
}

.startup-container svg {
  width: 100%;
  max-width: 825px; /* original width */
}

/* 1. 0s-0.5s: Initial reveal */
#logo {
  animation: reveal 0.5s ease-out forwards;
}

@keyframes reveal {
  from { opacity: 0; transform: scale(0.9); }
  to { opacity: 1; transform: scale(1); }
}

/* 2. 0.5s-2.5s: Idle state - each letter floats */
@keyframes floatLetter {
  0% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
  100% { transform: translateY(0); }
}

@keyframes fadeOutLetter {
  from { opacity: 1; }
  to { opacity: 0; }
}

@keyframes zoomO {
  from { transform: scale(1); }
  to { transform: scale(40); }
}

@keyframes fadeOutO {
  from { opacity: 1; }
  to { opacity: 0; }
}

/* Apply animation to individual letters */
#P, #E, #T, #L, #I, #F, #E2 {
  animation: 
    floatLetter 2s ease-in-out infinite,
    fadeOutLetter 0.3s forwards;
}

/* Delays for floating (staggered) and fade out (fixed at 2.5s) */
#P  { animation-delay: 0.5s, 2.5s; }
#E  { animation-delay: 0.6s, 2.5s; }
#T  { animation-delay: 0.7s, 2.5s; }
#L  { animation-delay: 0.9s, 2.5s; }
#I  { animation-delay: 1.0s, 2.5s; }
#F  { animation-delay: 1.1s, 2.5s; }
#E2 { animation-delay: 1.2s, 2.5s; }

/* 3. 2.5s-4.0s: Zoom-through transition for #O */
#O {
  transform-origin: center center;
  transform-box: fill-box;
  animation: 
    floatLetter 2s 0.8s ease-in-out 1,
    zoomO 0.9s 2.8s cubic-bezier(0.7, 0, 0.3, 1) forwards,
    fadeOutO 0.5s 3.5s forwards;
}

  </style>
</head>
