
<style>
*{box-sizing:border-box;margin:0;padding:0}
.wrap{position:relative;width:100%;aspect-ratio:16/9;border-radius:12px;overflow:hidden;border:0.5px solid rgba(0,0,0,0.08)}
.bg{position:absolute;inset:0;background:rgba(248,248,250,0.94)}
.ui-layer{position:absolute;inset:0;pointer-events:none}
.nav{position:absolute;top:0;left:0;right:0;height:10%;background:rgba(255,255,255,0.8);border-bottom:0.5px solid rgba(0,0,0,0.06);display:flex;align-items:center;padding:0 4%}
.logo-pill{width:7%;height:36%;background:rgba(0,0,0,0.07);border-radius:6px}
.nav-r{margin-left:auto;display:flex;gap:3%;align-items:center}
.nav-pill{height:8px;border-radius:4px;background:rgba(0,0,0,0.06)}
.nav-btn{height:26px;width:13%;border-radius:20px;background:rgba(0,0,0,0.08)}
.hero{position:absolute;top:14%;left:5%;right:5%;height:50%;display:flex;gap:4%}
.hero-img{width:45%;height:100%;border-radius:10px;background:rgba(0,0,0,0.05);display:flex;flex-direction:column;gap:6%;padding:5%}
.hi1{width:100%;height:30%;border-radius:5px;background:rgba(0,0,0,0.06)}
.hi2{width:80%;height:18%;border-radius:4px;background:rgba(0,0,0,0.04)}
.hi3{width:60%;height:14%;border-radius:4px;background:rgba(0,0,0,0.04)}
.hero-txt{flex:1;display:flex;flex-direction:column;gap:5%;padding-top:4%}
.ht1{width:90%;height:20%;border-radius:5px;background:rgba(0,0,0,0.07)}
.ht2{width:70%;height:14%;border-radius:4px;background:rgba(0,0,0,0.05)}
.ht3{width:80%;height:10%;border-radius:4px;background:rgba(0,0,0,0.04)}
.ht4{width:40%;height:24%;border-radius:20px;background:rgba(0,0,0,0.07);margin-top:3%}
.cards{position:absolute;bottom:6%;left:5%;right:5%;display:flex;gap:2%}
.card{flex:1;height:55px;border-radius:8px;background:rgba(255,255,255,0.8);border:0.5px solid rgba(0,0,0,0.07)}
canvas.ov{position:absolute;inset:0;pointer-events:none}
.ctrl{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);padding:7px 22px;font-size:12px;font-weight:500;border-radius:20px;cursor:pointer;border:0.5px solid rgba(0,0,0,0.14);background:rgba(255,255,255,0.85);color:rgba(0,0,0,0.5);letter-spacing:.05em;backdrop-filter:blur(4px)}
.ctrl:hover{background:rgba(255,255,255,1);color:rgba(0,0,0,0.75)}
.ctrl:disabled{opacity:0.3;cursor:default}
.tmr{position:absolute;top:8px;right:12px;font-size:11px;color:rgba(0,0,0,0.2);font-variant-numeric:tabular-nums}
</style>

<div class="wrap" id="root">
  <div class="bg"></div>
  <div class="ui-layer">
    <div class="nav">
      <div class="logo-pill"></div>
      <div class="nav-r">
        <div class="nav-pill" style="width:42px"></div>
        <div class="nav-pill" style="width:52px"></div>
        <div class="nav-pill" style="width:38px"></div>
        <div class="nav-btn"></div>
      </div>
    </div>
    <div class="hero">
      <div class="hero-img"><div class="hi1"></div><div class="hi2"></div><div class="hi3"></div></div>
      <div class="hero-txt"><div class="ht1"></div><div class="ht2"></div><div class="ht3"></div><div class="ht4"></div></div>
    </div>
    <div class="cards"><div class="card"></div><div class="card"></div><div class="card"></div></div>
  </div>
  <canvas class="ov" id="cv"></canvas>
  <div class="tmr" id="tmr">3.0s</div>
  <button class="ctrl" id="btn" onclick="go()">▶ play animation</button>
</div>

<script>
(function(){
  const TOTAL=3000;
  const PAW=[
    "M205.116,153.078c31.534,11.546,69.397-12.726,84.58-54.209c15.174-41.484,1.915-84.462-29.614-96.001c-31.541-11.53-69.4,12.735-84.582,54.218C160.325,98.57,173.584,141.548,205.116,153.078z",
    "M85.296,219.239c32.987-2.86,56.678-40.344,52.929-83.75c-3.757-43.391-33.545-76.253-66.532-73.409c-32.984,2.869-56.674,40.36-52.921,83.759C22.53,189.23,52.313,222.091,85.296,219.239z",
    "M342.196,217.768c28.952,17.017,70.552-0.073,92.926-38.154c22.374-38.106,17.041-82.758-11.915-99.774c-28.951-17.001-70.56,0.097-92.93,38.178C307.905,156.117,313.245,200.768,342.196,217.768z",
    "M497.259,262.912c-18.771-27.271-63.07-29.379-98.954-4.694c-35.892,24.701-49.762,66.822-30.996,94.101c18.766,27.27,63.069,29.38,98.954,4.686C502.143,332.312,516.021,290.191,497.259,262.912z",
    "M304.511,268.059c-3.58-24.773-18.766-47.366-43.039-58.824c-24.268-11.45-51.365-8.807-72.758,4.169c-23.646,14.35-38.772,33.096-59.138,41.29c-20.363,8.193-77.4-16.209-112.912,48.278c-25.081,45.548-2.057,103.128,44.962,125.315c35.738,16.864,64.023,14.981,84.788,24.774c20.762,9.793,37.29,32.83,73.025,49.692c47.018,22.188,106.1,3.362,125.315-44.957c27.206-68.407-27.897-96.922-34.522-117.85C303.613,319.021,308.472,295.426,304.511,268.059z"
  ];

  const PAWS=[
    {t:0.0,  cx:0.13, cy:0.78},
    {t:0.45, cx:0.41, cy:0.50},
    {t:0.90, cx:0.71, cy:0.22},
  ];

  // text: fade in 1.45→1.85s, hold, fade out 2.65→3.0s
  const T_IN=1.45, T_FULL=1.85, T_FADE=2.65, T_END=3.00;

  let raf=null, t0=null, pawCache={};

  function makePaw(sz){
    const oc=document.createElement('canvas');
    oc.width=sz; oc.height=sz;
    const ctx=oc.getContext('2d');
    ctx.scale(sz/512, sz/512);
    ctx.fillStyle='rgba(100,100,110,0.72)';
    PAW.forEach(d=>ctx.fill(new Path2D(d)));
    return oc;
  }

  function getPaw(sz){
    if(!pawCache[sz]) pawCache[sz]=makePaw(sz);
    return pawCache[sz];
  }

  function easeOutCubic(t){return 1-Math.pow(1-t,3);}
  function easeInOutCubic(t){return t<.5?4*t*t*t:(t-1)*(2*t-2)*(2*t-2)+1;}
  function clamp(v,a,b){return Math.max(a,Math.min(b,v));}

  function draw(sec){
    const cv=document.getElementById('cv');
    if(!cv) return;
    const W=cv.width, H=cv.height;
    const ctx=cv.getContext('2d');
    ctx.clearRect(0,0,W,H);

    const SZ=Math.round(W*0.115);
    const paw=getPaw(SZ);

    PAWS.forEach(p=>{
      const el=sec-p.t;
      if(el<0) return;
      const FADE=0.30;
      let op,sc;
      if(el<FADE){
        const prog=clamp(el/FADE,0,1);
        op=easeOutCubic(prog)*0.42;
        sc=0.6+0.4*easeOutCubic(prog);
      } else {
        op=0.42; sc=1.0;
      }
      const cx=p.cx*W, cy=p.cy*H;
      const s=SZ*sc;
      ctx.save();
      ctx.globalAlpha=op;
      ctx.drawImage(paw, cx-s/2, cy-s/2, s, s);
      ctx.restore();
    });

    if(sec<T_IN) return;

    // single unified opacity for the whole text block
    let op;
    if(sec<T_FULL){
      op=easeInOutCubic(clamp((sec-T_IN)/(T_FULL-T_IN),0,1));
    } else if(sec<T_FADE){
      op=1.0;
    } else {
      op=1.0-easeInOutCubic(clamp((sec-T_FADE)/(T_END-T_FADE),0,1));
    }
    op=clamp(op,0,1);
    if(op<0.002) return;

    const cx=W/2, cy=H/2;
    const fs=Math.round(W*0.062);
    const ruleW=Math.round(W*0.22);

    ctx.save();
    ctx.globalAlpha=op;

    // hairline rule above
    ctx.fillStyle='rgba(18,18,22,0.28)';
    ctx.fillRect(cx-ruleW/2, cy-fs*0.88, ruleW, 0.75);

    // "coming soon" — whole word at once, serif, light weight
    ctx.fillStyle='rgba(18,18,22,1)';
    ctx.font=`300 ${fs}px "Georgia","Times New Roman",serif`;
    ctx.textAlign='center';
    ctx.textBaseline='alphabetic';
    ctx.letterSpacing=`${Math.round(W*0.004)}px`;
    ctx.fillText('coming soon', cx, cy+fs*0.08);

    // hairline rule below
    ctx.fillStyle='rgba(18,18,22,0.28)';
    ctx.fillRect(cx-ruleW/2, cy+fs*0.30, ruleW, 0.75);

    ctx.restore();
  }

  function resize(){
    const root=document.getElementById('root');
    const cv=document.getElementById('cv');
    if(!root||!cv) return;
    const r=root.getBoundingClientRect();
    cv.width=Math.round(r.width);
    cv.height=Math.round(r.height);
    pawCache={};
  }

  function tick(ts){
    if(!t0) t0=ts;
    const elapsed=(ts-t0)/1000;
    const sec=Math.min(elapsed,TOTAL/1000);
    const tmr=document.getElementById('tmr');
    if(tmr) tmr.textContent=Math.max(0,TOTAL/1000-elapsed).toFixed(1)+'s';
    draw(sec);
    if(elapsed<TOTAL/1000){
      raf=requestAnimationFrame(tick);
    } else {
      setTimeout(()=>{
        const cv=document.getElementById('cv');
        if(cv) cv.getContext('2d').clearRect(0,0,cv.width,cv.height);
        const tmr=document.getElementById('tmr');
        if(tmr) tmr.textContent='3.0s';
      },60);
      const btn=document.getElementById('btn');
      if(btn){btn.disabled=false;btn.textContent='▶ play animation';}
    }
  }

  window.go=function(){
    if(raf){cancelAnimationFrame(raf);raf=null;}
    resize();
    const btn=document.getElementById('btn');
    if(btn){btn.disabled=true;btn.textContent='⏸ playing...';}
    t0=null;
    raf=requestAnimationFrame(tick);
  };

  window.addEventListener('resize',()=>resize());
  setTimeout(resize,80);
})();
</script>
