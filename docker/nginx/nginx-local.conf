# ─────────────────────────────────────────────────────────────────────────────
# PetOLife — Nginx LOCAL Configuration (HTTP only, localhost)
#
# Mirrors production routing exactly, but without SSL.
# Used when running docker compose up locally before deploying.
#
# Access: http://localhost/
#
# API routing:
#   /api/v1/* → FastAPI (rewrites /v1 → strips it, for future public API versioning)
#   /api/*    → FastAPI (direct proxy, for frontend internal calls)
# ─────────────────────────────────────────────────────────────────────────────

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent"';

    access_log  /var/log/nginx/access.log  main;
    sendfile        on;
    keepalive_timeout  65;

    # ── Rate Limit Zones ──────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=global_limit:20m  rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:5m    rate=1r/s;
    limit_req_status 429;
    limit_req_log_level warn;

    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
    limit_conn_status 429;

    # ── Upstream Backend ──────────────────────────────────────────────────────
    upstream petolife_backend {
        server backend:8000;
        keepalive 32;
    }

    # ── Local Server (HTTP only) ──────────────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name localhost;

        server_tokens off;
        client_max_body_size 10m;
        keepalive_timeout 65;
        limit_conn conn_limit 20;

        gzip on;
        gzip_vary on;
        gzip_proxied any;
        gzip_comp_level 6;
        gzip_types text/plain text/css text/xml text/javascript
                   application/json application/javascript application/xml+rss
                   application/atom+xml image/svg+xml;

        # ── Block FastAPI auto-docs ───────────────────────────────────────────
        location ~ ^/api/(v1/)?(docs|redoc|openapi\.json)$ {
            return 404;
        }

        # ── Auth endpoints — tight rate limit ─────────────────────────────────
        # Matches both /api/v1/auth/... and /api/auth/...
        location ~ ^/api/(v1/)?auth/(login|signup|google)$ {
            limit_req zone=auth_limit burst=5 nodelay;
            limit_req zone=global_limit burst=50 nodelay;

            rewrite ^/api/v1/(.*)$ /api/$1 break;
            proxy_pass         http://petolife_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_connect_timeout 15s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        # ── /api/v1/* → FastAPI (public API versioned path) ───────────────────
        location /api/v1/ {
            limit_req zone=global_limit burst=50 nodelay;

            rewrite ^/api/v1/(.*)$ /api/$1 break;
            proxy_pass         http://petolife_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_connect_timeout 30s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        # ── /api/* → FastAPI (direct frontend calls, no /v1 prefix) ──────────
        location /api/ {
            limit_req zone=global_limit burst=50 nodelay;

            proxy_pass         http://petolife_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_connect_timeout 30s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        # ── React SPA — all other requests ───────────────────────────────────
        location / {
            root  /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;

            location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot|webp)$ {
                expires    1y;
                add_header Cache-Control "public, immutable";
                access_log off;
            }

            location = /index.html {
                add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
                add_header Pragma "no-cache";
                expires 0;
            }
        }
    }
}
