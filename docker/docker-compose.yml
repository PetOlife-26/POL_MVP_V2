# ─────────────────────────────────────────────────────────────────────────────
# PetOLife — docker-compose.yml
#
# ONE file that works both locally and on the production server.
#
# Environment is controlled by a root-level .env file:
#
#   ENVIRONMENT=local       → uses nginx/nginx-local.conf  (HTTP, localhost:80)
#   ENVIRONMENT=production  → uses nginx/nginx.conf        (HTTPS, petolife.com)
#
# Usage:
#   Local testing:          docker compose up -d --build
#   Production (server):    ENVIRONMENT=production docker compose up -d --build
#                           (or set ENVIRONMENT=production in .env on the server)
#
#   View logs:              docker compose logs -f
#   Backend logs only:      docker compose logs -f backend
#   Stop:                   docker compose down
# ─────────────────────────────────────────────────────────────────────────────

# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  certbot_www:       # ACME HTTP-01 challenge files
  certbot_conf:      # SSL certs + Let's Encrypt account
  nginx_logs:        # Persistent Nginx access/error logs

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  petolife_internal:
    driver: bridge
  petolife_external:
    driver: bridge

# ─────────────────────────────────────────────────────────────────────────────
services:

  # ── FastAPI Backend ───────────────────────────────────────────────────────
  backend:
    image: petolife-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env                # Same .env you use locally — no changes needed
    environment:
      FRONTEND_URL: "${FRONTEND_URL:-http://localhost}"   # Override in .env for production
    networks:
      - petolife_internal             # NOT exposed to internet — Nginx proxies to it
    expose:
      - "8000"                        # Internal only, not published to host
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "-O", "/dev/null", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 25s
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  # ── Nginx + React SPA ─────────────────────────────────────────────────────
  # Multi-stage Dockerfile.frontend:
  #   Stage 1 (builder): Node 20 → npm build → /app/dist
  #   Stage 2 (runner):  Nginx 1.27 → serves /app/dist
  #
  # The nginx config is selected by NGINX_CONF env variable:
  #   nginx/nginx-local.conf  → local HTTP testing on localhost
  #   nginx/nginx.conf        → production HTTPS on petolife.com
  nginx:
    image: petolife-nginx:latest
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${NGINX_CONF:-./nginx/nginx-local.conf}:/etc/nginx/nginx.conf:ro
      - certbot_conf:/etc/letsencrypt:ro              # SSL certificates (empty locally — fine)
      - certbot_www:/var/www/certbot:ro               # ACME challenge files
      - nginx_logs:/var/log/nginx                     # Persistent log storage
    networks:
      - petolife_internal
      - petolife_external
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Certbot (Let's Encrypt SSL auto-renewal) ──────────────────────────────
  # Runs in both environments — harmless locally (just sleeps doing nothing).
  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: >
      /bin/sh -c "trap exit TERM;
        while :; do
          certbot renew --webroot --webroot-path=/var/www/certbot --quiet;
          sleep 12h & wait $${!};
        done"
    restart: unless-stopped
    networks:
      - petolife_external
