# ─────────────────────────────────────────────────────────────────────────────
# PetOLife — Nginx Production Configuration
# ─────────────────────────────────────────────────────────────────────────────

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # ── Rate Limit Zones ──────────────────────────────────────────────────────────
    # Global API limit: 30 req/s per IP (= 300 req in 10 seconds)
    limit_req_zone $binary_remote_addr zone=global_limit:20m  rate=30r/s;

    # Auth-specific limit: 1 req/s per IP (= 10 in 10 seconds)
    limit_req_zone $binary_remote_addr zone=auth_limit:5m    rate=1r/s;

    limit_req_status 429;
    limit_req_log_level warn;

    # ── Connection limit: max 20 simultaneous connections per IP ─────────────────
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
    limit_conn_status 429;

    # ── Upstream Backend ──────────────────────────────────────────────────────────
    upstream petolife_backend {
        server backend:8000;
        keepalive 32;
    }

    # ─── HTTP → HTTPS Redirect ────────────────────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name petolife.com www.petolife.com;

        # Let's Encrypt ACME HTTP-01 challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            allow all;
        }

        # Hard-redirect everything else to HTTPS
        location / {
            return 301 https://petolife.com$request_uri;
        }
    }

    # ─── HTTPS Main Server ────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name petolife.com www.petolife.com;

        # ── Hide server identity ───────────────────────────────────────────────
        server_tokens off;

        # ── SSL Certificates (Let's Encrypt / Certbot) ────────────────────────
        ssl_certificate     /etc/letsencrypt/live/petolife.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/petolife.com/privkey.pem;

        # ── SSL Hardening ─────────────────────────────────────────────────────
        ssl_protocols        TLSv1.2 TLSv1.3;
        ssl_ciphers          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_timeout  1d;
        ssl_session_cache    shared:MozSSL:10m;
        ssl_session_tickets  off;
        ssl_stapling         on;
        ssl_stapling_verify  on;

        # ── Security Headers ──────────────────────────────────────────────────
        add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options            "SAMEORIGIN"                                   always;
        add_header X-Content-Type-Options     "nosniff"                                      always;
        add_header X-XSS-Protection           "1; mode=block"                                always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"              always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"     always;
        # CSP: allows Supabase storage for images, Google Fonts
        add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.supabase.co; connect-src 'self' https://*.supabase.co https://olmpcmvgvdsgvnwiriut.supabase.co;" always;

        # ── General Settings ──────────────────────────────────────────────────
        client_max_body_size 10m;
        keepalive_timeout    65;

        # Apply global connection limit
        limit_conn conn_limit 20;

        # ── Gzip Compression ──────────────────────────────────────────────────
        gzip              on;
        gzip_vary         on;
        gzip_proxied      any;
        gzip_comp_level   6;
        gzip_types        text/plain text/css text/xml text/javascript
                          application/json application/javascript application/xml+rss
                          application/atom+xml image/svg+xml;

        # ── www → non-www canonical redirect ─────────────────────────────────
        if ($host = www.petolife.com) {
            return 301 https://petolife.com$request_uri;
        }

        # Block FastAPI auto-docs in production
        location ~ ^/api/(v1/)?(docs|redoc|openapi\.json)$ {
            return 404;
        }

        # AUTH endpoints — Tightest rate limit
        # Matches /api/v1/auth/... AND /api/auth/... (frontend direct calls)
        location ~ ^/api/(v1/)?auth/(login|signup|google)$ {
            limit_req  zone=auth_limit burst=5 nodelay;
            limit_req  zone=global_limit burst=50 nodelay;

            rewrite ^/api/v1/(.*)$ /api/$1 break;
            proxy_pass         http://petolife_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_connect_timeout 15s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        # API: /api/v1/* → FastAPI (public versioned path)
        location /api/v1/ {
            limit_req zone=global_limit burst=50 nodelay;

            rewrite ^/api/v1/(.*)$ /api/$1 break;

            proxy_pass         http://petolife_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            # Generous timeouts for photo upload (up to 60 s)
            proxy_connect_timeout 30s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        # API: /api/* → FastAPI (direct frontend calls, no /v1 prefix)
        location /api/ {
            limit_req zone=global_limit burst=50 nodelay;

            proxy_pass         http://petolife_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            proxy_connect_timeout 30s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        # Frontend: React SPA
        location / {
            root  /usr/share/nginx/html;
            index index.html;

            try_files $uri $uri/ /index.html;

            # Static assets
            location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot|webp)$ {
                expires    1y;
                add_header Cache-Control "public, immutable";
                access_log off;
            }

            # Never cache index.html
            location = /index.html {
                add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
                add_header Pragma "no-cache";
                expires 0;
            }
        }

        # Drop hidden file requests silently
        location ~ /\. {
            deny all;
            return 444;
            access_log off;
            log_not_found off;
        }

        # Block common attack paths
        location ~* (phpMyAdmin|phpmyadmin|mysqladmin|wp-admin|wp-login|\.php$) {
            return 444;
            access_log off;
            log_not_found off;
        }
    }
}
